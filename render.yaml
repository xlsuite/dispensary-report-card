# Render Blueprint — one-click deployment config
#
# When you connect this repo to Render, this file tells Render exactly
# what kind of service to spin up. Don't edit unless you know what you're
# doing — DEPLOY.md walks through the setup step by step.

services:
  - type: web
    name: dispensary-report-card
    runtime: python
    # Matches the paid tier you're on. Leaving this as "free" risks the
    # blueprint downgrading the service on its next sync (which would also
    # starve the extra worker of memory).
    plan: starter
    buildCommand: pip install -r requirements.txt
    # 2 workers so a long scan on one worker doesn't block the whole site:
    # the landing page, /health, and stored reports stay responsive while a
    # scan runs. Kept at 2 (not more) because Starter has 512 MB RAM and
    # parsing large pages is memory-heavy — 3+ workers risks OOM.
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 90
    healthCheckPath: /health
    # Persistent disk for the SQLite database (stored reports + captured
    # leads survive deploys and restarts). ~$0.25/month at 1 GB.
    disk:
      name: reportcard-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/reports.db
      # Secret for the /admin leads page. Set any long random string in the
      # Render dashboard (Environment tab). If unset, /admin is disabled.
      - key: ADMIN_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: RATE_LIMIT
        value: "5"
      - key: RATE_WINDOW
        value: "3600"
      # Optional — enables Google Business Profile checks in the report.
      # When unset, the scanner still runs and scores everything else;
      # the GBP category only credits website-visible signals.
      # To enable: get a Places API key (see DEPLOY.md Part 5), then add
      # this env var in the Render dashboard (Settings -> Environment).
      - key: GOOGLE_PLACES_API_KEY
        sync: false  # tells Render to prompt for the value on first deploy
    autoDeploy: true
